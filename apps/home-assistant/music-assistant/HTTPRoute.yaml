  name: homeassistant
  labels:
    io.kompose.service: music-assistant-server
spec:
  parentRefs:
  - name: https-gateway
    namespace: kube-system
  hostnames:
  - "music-assistant.camsab.me"
  rules:
  - backendRefs:
    - name: music-assistant-server
      port: 8095