certManager:
  clusterIssuer: letsencrypt-staging

serverName: ftwr.camsab.me

networking:
  ## Whether components should attempt to bind IPv4 (ipv4) /IPv6 (ipv6) / both (dual-stack)
  ipFamily: ipv4


matrixRTC:
  enabled: true
  ingress:
    host: mrtc-ftwr.camsab.me

    ## Disable TLS configuration by setting it to false
    tlsEnabled: true
    tlsSecret: mrtc

elementAdmin:
  enabled: true
  ## How this ingress should be constructed
  ingress:
    host: admin-ftwr.camsab.me
    tlsEnabled: true
    tlsSecret: admin

elementWeb:
  enabled: true
  ingress:
    host: chat-ftwr.camsab.me

    ## Disable TLS configuration by setting it to false
    tlsEnabled: true
    tlsSecret: chat

hookshot:
  enabled: false

matrixAuthenticationService:
  enabled: true
  ingress:
    host: account-ftwr.camsab.me

    tlsEnabled: true
    tlsSecret: account
  additional:
    auth:
      configSecret: additional-configs
      configSecretKey: auth

postgres:
  enabled: true

synapse:
  enabled: true
  ingress:
    host: matrix-ftwr.camsab.me

    ## Disable TLS configuration by setting it to false
    tlsEnabled: true
    tlsSecret: matrix